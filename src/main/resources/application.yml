server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: lost-found-api
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/campus_lost_found?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

app:
  jwt:
    user-secret: "campus-lost-found-user-jwt-secret-key-change-in-prod-min-256-bits-please"
    admin-secret: "campus-lost-found-admin-jwt-secret-key-change-in-prod-min-256-bits"
    user-expire-days: 7
    admin-expire-hours: 24
  upload-dir: D:/java/yg/uploads
  public-base-url: http://localhost:8080
  wechat:
    app-id: ${WECHAT_APP_ID:wx077db7cf021664ac}
    app-secret: ${WECHAT_APP_SECRET:cd36453c11ba307137392e705071009d}
  # 必须写成 YAML 列表，不能写成一行逗号分隔字符串，否则无法正确绑定为 List<String>
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
  # 物品发布：false 时提交后直接上架（首页可见）；true 时需管理员在后台「待审核」中通过后才展示
  items:
    require-audit: true

logging:
  level:
    com.campus: INFO
