server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: lost-found-api
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/campus_lost_found?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: *****
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

app:
  jwt:
    user-secret: "campus-lost-found-user-jwt-secret-key-change-in-prod-min-256-bits-please"
    admin-secret: "campus-lost-found-admin-jwt-secret-key-change-in-prod-min-256-bits"
    user-expire-days: 7
    admin-expire-hours: 24
  upload-dir: D:/java/yg/uploads
  public-base-url: http://192.168.3.183:8080
  wechat:
    app-id: ${WECHAT_APP_ID:*********}
    app-secret: ${WECHAT_APP_SECRET:**********************}
  # 蹇呴』鍐欐垚 YAML 鍒楄〃锛屼笉鑳藉啓鎴愪竴琛岄€楀彿鍒嗛殧瀛楃涓诧紝鍚﹀垯鏃犳硶姝ｇ‘缁戝畾涓?List<String>
